name: Build and deploy to GitHub Pages

# Runs on every push to master. Builds the Vite project and publishes the
# `dist/` folder to GitHub Pages using the official Pages deploy flow.
# Pages must be enabled for this repo in:
#   Settings -> Pages -> Build and deployment -> Source = "GitHub Actions"

on:
  push:
      branches: [master]
        # Allow manual re-deploys from the Actions tab
          workflow_dispatch:

          # Allow GITHUB_TOKEN to deploy to Pages and authenticate via OIDC
          permissions:
            contents: read
              pages: write
                id-token: write

                # Only one Pages deployment at a time. New pushes cancel in-progress runs
                # so we never publish a stale build over a newer one.
                concurrency:
                  group: pages
                    cancel-in-progress: true

                    jobs:
                      build:
                          runs-on: ubuntu-latest
                              steps:
                                    - name: Checkout
                                            uses: actions/checkout@v4

                                                  - name: Setup Node.js
                                                          uses: actions/setup-node@v4
                                                                  with:
                                                                            node-version: 22
                                                                                      cache: npm

                                                                                            - name: Install dependencies
                                                                                                    run: npm ci
                                                                                                    
                                                                                                          - name: Build
                                                                                                                  run: npm run build
                                                                                                                  
                                                                                                                        - name: Upload Pages artifact
                                                                                                                                uses: actions/upload-pages-artifact@v3
                                                                                                                                        with:
                                                                                                                                                  path: dist
                                                                                                                                                  
                                                                                                                                                    deploy:
                                                                                                                                                        needs: build
                                                                                                                                                            runs-on: ubuntu-latest
                                                                                                                                                                environment:
                                                                                                                                                                      name: github-pages
                                                                                                                                                                            url: ${{ steps.deployment.outputs.page_url }}
                                                                                                                                                                                steps:
                                                                                                                                                                                      - name: Deploy to GitHub Pages
                                                                                                                                                                                              id: deployment
                                                                                                                                                                                                      uses: actions/deploy-pages@v4
